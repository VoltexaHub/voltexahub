server {
    listen 80;
    server_name _;
    root /app/public;

    client_max_body_size 50M;

    # Laravel storage (symlinked)
    location /storage {
        try_files $uri =404;
    }

    # API, broadcasting, and all PHP-handled routes
    location ~ ^/(api|broadcasting|sanctum|email|password|oauth|login|logout|register)/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP processing
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 120;
    }

    # Vite-built assets (cache forever — filenames are hashed)
    location /assets/ {
        root /app/public/spa;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Everything else → SPA
    location / {
        root /app/public/spa;
        try_files $uri /index.html;
    }
}
