services:
  forum_INSTANCE_ID:
    image: voltexahub:latest
    container_name: forum_INSTANCE_ID
    restart: unless-stopped
    environment:
      APP_NAME: "VoltexaHub"
      APP_ENV: production
      APP_KEY: "INSTANCE_APP_KEY"
      APP_DEBUG: "false"
      APP_URL: "https://INSTANCE_SUBDOMAIN.voltexahub.com"
      LOG_CHANNEL: stderr
      DB_CONNECTION: mysql
      DB_HOST: MYSQL_HOST
      DB_PORT: 3306
      DB_DATABASE: "forum_INSTANCE_ID"
      DB_USERNAME: "forum_INSTANCE_ID"
      DB_PASSWORD: "INSTANCE_DB_PASSWORD"
      BROADCAST_CONNECTION: pusher
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      PUSHER_APP_ID: "INSTANCE_ID"
      PUSHER_APP_KEY: "INSTANCE_PUSHER_KEY"
      PUSHER_APP_SECRET: "INSTANCE_PUSHER_SECRET"
      PUSHER_HOST: soketi
      PUSHER_PORT: 6001
      PUSHER_SCHEME: http
      PUSHER_APP_CLUSTER: mt1
      MAIL_MAILER: log
      MAIL_FROM_ADDRESS: "noreply@voltexahub.com"
      MAIL_FROM_NAME: "VoltexaHub"
      FILESYSTEM_DISK: public
    volumes:
      - forum_INSTANCE_ID_storage:/app/storage/app/public
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.forum_INSTANCE_ID.rule=Host(`INSTANCE_SUBDOMAIN.voltexahub.com`)"
      - "traefik.http.routers.forum_INSTANCE_ID.tls=true"
      - "traefik.http.routers.forum_INSTANCE_ID.tls.certresolver=letsencrypt"
      - "traefik.http.services.forum_INSTANCE_ID.loadbalancer.server.port=80"

volumes:
  forum_INSTANCE_ID_storage:

networks:
  traefik-public:
    external: true
