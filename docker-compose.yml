services:
  app:
    build:
      context: .
      args:
        UID: 1000
        GID: 1000
    container_name: voltexa-app
    volumes:
      - ./:/var/www/html
    depends_on:
      - postgres
      - redis
    networks:
      - voltexa

  nginx:
    image: nginx:alpine
    container_name: voltexa-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - voltexa

  postgres:
    image: postgres:16-alpine
    container_name: voltexa-postgres
    environment:
      POSTGRES_DB: voltexahub
      POSTGRES_USER: voltexa
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - voltexa

  redis:
    image: redis:7-alpine
    container_name: voltexa-redis
    ports:
      - "6379:6379"
    networks:
      - voltexa

  node:
    image: node:20-alpine
    container_name: voltexa-node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "5173:5173"
    command: sh -c "if [ -f package.json ]; then npm install && npm run dev -- --host; else sleep infinity; fi"
    networks:
      - voltexa

networks:
  voltexa:
    driver: bridge

volumes:
  pgdata:
