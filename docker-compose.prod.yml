# Production overlay. Use together with the base docker-compose.yml:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Notable differences from dev:
#   - No bind-mounted source: code + built assets are baked into the multi-stage image
#   - Dev bindings on localhost ports are removed — nothing is exposed to the host
#   - Caddy fronts the stack with automatic HTTPS for the domain you set in docker/Caddyfile
#   - A queue worker handles mail + notification dispatch
#   - A scheduler loop fires weekly digests and any other cron-like work
#   - The Vite dev server is disabled; assets come from the prod stage

services:
  app:
    build:
      target: prod
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    volumes: !reset
      - app_storage:/var/www/html/storage
      - app_bootcache:/var/www/html/bootstrap/cache

  nginx:
    restart: unless-stopped
    ports: !reset []
    expose:
      - "80"
    volumes: !reset
      - app_storage:/var/www/html/storage:ro

  postgres:
    restart: unless-stopped
    ports: !reset []

  redis:
    restart: unless-stopped
    ports: !reset []

  reverb:
    build:
      target: prod
    restart: unless-stopped
    ports: !reset []
    expose:
      - "8081"
    volumes: !reset
      - app_storage:/var/www/html/storage

  node:
    profiles: ["disabled"]

  queue:
    build:
      context: .
      target: prod
      args: { UID: 1000, GID: 1000 }
    container_name: voltexa-queue
    command: php artisan queue:work --tries=3 --timeout=90 --sleep=3
    volumes:
      - app_storage:/var/www/html/storage
    depends_on: [ postgres, redis ]
    restart: unless-stopped
    networks: [ voltexa ]

  scheduler:
    build:
      context: .
      target: prod
      args: { UID: 1000, GID: 1000 }
    container_name: voltexa-scheduler
    command: php artisan schedule:work
    volumes:
      - app_storage:/var/www/html/storage
    depends_on: [ postgres, redis ]
    restart: unless-stopped
    networks: [ voltexa ]

  caddy:
    image: caddy:2-alpine
    container_name: voltexa-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [ nginx, reverb ]
    networks: [ voltexa ]

volumes:
  caddy_data:
  caddy_config:
  app_storage:
  app_bootcache:
